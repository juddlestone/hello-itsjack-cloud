name: Deploy Static WebApp

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - dev
          - prd

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  ENVIRONMENT: ${{ inputs.environment || 'prd' }}

jobs:
  plan:
    name: Terraform Plan (${{ inputs.environment || 'prd' }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'prd' }}
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Terraform | Setup
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_PRD }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
            
      - name: Terraform | Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.BACKEND_RESOURCE_GROUP_NAME }}" \
            -backend-config="storage_account_name=${{ secrets.BACKEND_STORAGE_ACCOUNT_NAME }}" \
            -backend-config="container_name=${{ secrets.BACKEND_CONTAINER_NAME_PRD }}" \
            -backend-config="key=${{ env.ENVIRONMENT }}.${{ secrets.BACKEND_KEY }}"

      - name: Terraform | Validate
        run: terraform validate

      - name: Terraform | Format Check
        run: terraform fmt -check -recursive

      - name: Terraform | Plan
        run: |
          terraform plan \
            -var-file="environments/${{ env.ENVIRONMENT }}.tfvars" \
            -out=tfplan

      - name: Upload Plan and Lock File
        uses: actions/upload-artifact@v5
        with:
          name: tfplan
          path: |
            tfplan
            .terraform.lock.hcl
          retention-days: 1
    
  apply:
    name: Terraform Apply (${{ inputs.environment || 'prd' }})
    runs-on: ubuntu-latest
    needs: plan
    environment: ${{ inputs.environment || 'prd' }}
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Download Plan and Lock File
        uses: actions/download-artifact@v6
        with:
          name: tfplan

      - name: Terraform | Setup
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_PRD }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
            
      - name: Terraform | Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.BACKEND_RESOURCE_GROUP_NAME }}" \
            -backend-config="storage_account_name=${{ secrets.BACKEND_STORAGE_ACCOUNT_NAME }}" \
            -backend-config="container_name=${{ secrets.BACKEND_CONTAINER_NAME_PRD }}" \
            -backend-config="key=${{ env.ENVIRONMENT }}.${{ secrets.BACKEND_KEY }}"

      - name: Terraform | Apply
        run: terraform apply -auto-approve tfplan